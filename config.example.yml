poll_interval_seconds: 60

imap:
  host: mail.infomaniak.com
  port: 993
  folder_inbox: INBOX
  folder_processed: Processed
  folder_failed: Failed

smtp:
  host: mail.infomaniak.com
  port: 587
  from_address: pipeline@yourdomain.com
  from_name: "Document Assistant"

backend: mistral

# Model overrides — defaults shown, omit section to use them as-is
backends:
  mistral:
    ocr_model: mistral-ocr-2512
    chat_model: mistral-small-latest

defaults:
  mode: translate        # translate | summary
  language: en           # ISO 639-1 code; applied when a recipient omits language

# ISO 639-1 code -> language name used in prompts
languages:
  en: English
  es: Spanish
  fr: French
  de: German
  it: Italian
  pt: Portuguese

# One entry per recipient. The key must match the '+tag' in the destination address
# (e.g. pipeline+alice@yourdomain.com → key: alice).
# address is required; mode and language override the global defaults when set.
recipients:
  alice:
    address: alice@example.com
    mode: translate
    language: en
  bob:
    address: bob@example.com
    language: de

# Used when the person key is unrecognised
fallback_reply_to: alice@example.com

# What to do with the source mail after handling
# 'move' is recommended for failures so no scan is ever silently lost
on_success: move         # move | delete
on_failure: move         # move | delete

max_attachment_mb: 25      # per-attachment size limit
max_attachments: 10        # max attachments processed per message (extras are ignored)

# Restrict who may trigger the pipeline. The mailbox accepts mail from anyone, so
# without an allowlist any sender can spend backend credits and have documents
# relayed to your recipients. Leave empty to accept all senders (not recommended).
# Entries may be a full address (boss@example.com) or a domain (example.com).
allowed_senders:
  - scanner@yourdomain.com
  - yourdomain.com
